name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub is optional: set repository variable PUBLISH_DOCKERHUB=true
      # and secrets DOCKERHUB_USERNAME / DOCKERHUB_TOKEN to enable it.
      - name: Log in to Docker Hub
        if: vars.PUBLISH_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          # GHCR requires a lowercase repository path.
          repo="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          ver="${{ steps.ver.outputs.version }}"
          tags="ghcr.io/${repo}:${ver},ghcr.io/${repo}:latest"
          if [ "${{ vars.PUBLISH_DOCKERHUB }}" = "true" ]; then
            dh="${{ secrets.DOCKERHUB_USERNAME }}/gallery-site"
            tags="${tags},${dh}:${ver},${dh}:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.tags.outputs.tags }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
